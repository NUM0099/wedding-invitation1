<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - නිපුන් සහ නුවන්ති</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-coral: #ff7f50;
            --secondary-pink: #ff4081;
            --text-maroon: #800000;
            --bg-card: rgba(255, 245, 240, 0.95);
            --whatsapp-green: #25D366;
            --calendar-blue: #4285F4;
            --white: #ffffff;
            --black: #000000;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Abhaya Libre', serif;
            background-color: #f8e3e0;
            color: var(--text-maroon);
            overflow-x: hidden;
        }

        @keyframes colorShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #first-page-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #f8e3e0;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            z-index: 100; transition: opacity 1s ease, transform 1s ease;
        }

        .first-page-title {
            font-size: 4rem; font-weight: bold;
            background: linear-gradient(270deg, #ff0000, #ff80ab, #ff6e40, #ff0000);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; animation: colorShift 5s linear infinite;
        }

        .open-btn {
            background: linear-gradient(to right, #ff4081, #ff6e40);
            color: white; border: none; padding: 15px 40px; font-size: 1.1rem; font-weight: bold;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 64, 129, 0.4);
            margin: 30px 0 15px 0;
        }

        .scroll-hint-wrapper {
            display: flex; flex-direction: column; align-items: center; margin-top: 10px;
            color: var(--text-maroon); opacity: 0.7; animation: bounceUpDown 2s ease-in-out infinite; cursor: pointer;
        }
        @keyframes bounceUpDown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        #invitation-details { display: none; width: 100%; flex-direction: column; align-items: center; padding-bottom: 50px; }

        .main-container {
            background-color: var(--bg-card);
            max-width: 500px; width: 100%; min-height: 100vh; padding: 40px 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.1); text-align: center;
            border-left: 6px solid var(--primary-coral); border-right: 6px solid var(--primary-coral);
            position: relative; box-sizing: border-box;
        }

        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .name-card { background: #fffcfb; border: 1.5px solid var(--primary-coral); border-radius: 25px; padding: 25px 15px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(255, 127, 80, 0.1); }
        .parent-text { font-size: 1.3rem; color: var(--black); margin-bottom: 10px; line-height: 1.6; }
        .animated-father-name { font-size: 22px; font-weight: bold; background: linear-gradient(270deg, #ff0000, #ff80ab, #ff6e40, #ff0000); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: colorShift 5s linear infinite; display: inline-block; }
        .main-name { font-size: 2rem; font-weight: bold; color: var(--primary-coral); margin: 0; }

        .heart { position: absolute; top: -50px; z-index: 1; opacity: 0.5; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(3500px) rotate(360deg); } }

        .couple-names { font-size: 2.5rem; font-weight: bold; color: var(--primary-coral); margin: 15px 0; }
        .couple-img { width: 100%; border-radius: 15px; margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .countdown { display: flex; justify-content: center; gap: 8px; margin: 25px 0; }
        .timer-box { background: var(--text-maroon); color: white; padding: 10px; min-width: 60px; border-radius: 10px; }
        .timer-box span { font-size: 1.4rem; font-weight: bold; display: block; }

        .time-card { background: #fff; padding: 25px; border-radius: 15px; border-left: 5px solid var(--primary-coral); margin: 30px 0; font-size: 1.2rem; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .action-btn { display: flex; align-items: center; justify-content: center; padding: 12px 20px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1rem; color: white; }
        .wa-btn { background: var(--whatsapp-green); }
        .call-btn { background: var(--primary-coral); }
        .cal-btn { background: var(--calendar-blue); font-size: 0.9rem; margin: 10px 0; }

        .music-btn { position: fixed; bottom: 20px; right: 20px; z-index: 200; background: var(--primary-coral); border: none; width: 55px; height: 55px; border-radius: 50%; color: white; font-size: 24px; cursor: pointer; }
        .final-note { font-size: 1.2rem; font-weight: bold; color: var(--primary-coral); margin: 40px 0 20px 0; font-style: italic; }
    </style>
</head>
<body onwheel="handleScroll(event)" ontouchmove="handleTouch(event)">

<button class="music-btn" onclick="toggleM()"><span id="mI">🎵</span></button>
<audio id="mS" loop><source src="wedding-song.mp3" type="audio/mpeg"></audio>

<div id="first-page-view">
    <div class="reveal active">
        <h1 class="first-page-title">ශ්‍රී සුභ මංගලම්</h1>
        <div style="font-size: 2.2rem; font-weight: bold;">නිපුන් ❤️ නුවන්ති</div>
        <div style="font-size: 0.9rem; letter-spacing: 2px; opacity: 0.8;">NIPUN & NUWANTHI</div>
        <button class="open-btn" onclick="openInvitation()">OPEN INVITATION</button>
        <div class="scroll-hint-wrapper" onclick="openInvitation()">
            <span class="scroll-hint-text">scroll to explore</span>
            <span class="scroll-hint-icon">👇</span>
        </div>
    </div>
</div>

<div id="invitation-details">
    <div class="main-container" id="mainBox">
        <div style="position:relative; z-index:10;">
            
            <div class="reveal">
                <div style="font-size: 1.6rem; font-weight: bold; color: var(--primary-coral);">ශ්‍රී සුභ මංගලම්
